<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NEON || 3D Печать</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0a0a0a;
    color: white;
}

header {
    padding: 20px;
    text-align: center;
    font-size: 28px;
    font-weight: bold;
    color: #00f0ff;
}

.container {
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.card {
    background: #111;
    padding: 15px;
    border-radius: 10px;
    border: 1px solid #00f0ff33;
}

model-viewer {
    width: 100%;
    height: 200px;
    background: black;
    border-radius: 10px;
}

button {
    width: 100%;
    padding: 10px;
    background: #00f0ff;
    border: none;
    cursor: pointer;
    font-weight: bold;
}
</style>
</head>

<body>

<header>NEON || 3D Печать</header>

<div class="container" id="shop"></div>

<script>

/* 👉 ТУТ БУДУТ ТВОИ ТОВАРЫ */
let products = [
    {
        name: "3D Модель Меча",
        price: "15",
        model: "https://model.glb"
    },
    {
        name: "Фигурка Дракона",
        price: "25",
        model: "https://model.glb"
    }
];

const tgUser = "nekitka_one";

function renderShop(){
    let html = "";

    products.forEach(p=>{
        html += `
        <div class="card">
            <model-viewer src="${p.model}" auto-rotate camera-controls></model-viewer>
            <h3>${p.name}</h3>
            <p>€${p.price}</p>
            <button onclick="order('${p.name}')">Заказать</button>
        </div>`;
    });

    document.getElementById("shop").innerHTML = html;
}

function order(name){
    window.open("https://t.me/" + tgUser + "?text=Хочу заказать: " + name);
}

renderShop();

</script>

</body>
</html>
