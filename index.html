<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NEON || 3D Печать</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial;
    background: #f6f7fb;
    overflow-x: hidden;
}

/* мягкий фон */
body::before {
    content:"";
    position:fixed;
    inset:-20%;
    background:
        radial-gradient(circle at 20% 20%, rgba(120,160,255,0.10), transparent 40%),
        radial-gradient(circle at 80% 30%, rgba(180,200,255,0.10), transparent 45%),
        radial-gradient(circle at 40% 80%, rgba(200,220,255,0.08), transparent 50%);
    z-index:-1;
}

/* HEADER */
header {
    position: sticky;
    top: 0;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    padding: 18px 20px;
    border-bottom: 1px solid #eee;
}

/* бренд */
.brand {
    font-size: 20px;
    font-weight: 700;
}

/* описание как маркетплейс */
.subtitle {
    font-size: 13px;
    color: #666;
    margin-top: 4px;
    line-height: 1.4;
    max-width: 800px;
}

/* grid */
.container {
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
}

/* card */
.card {
    background: white;
    border-radius: 16px;
    padding: 14px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

/* buttons */
button {
    width: 100%;
    margin-top: 6px;
    padding: 10px;
    border: none;
    border-radius: 10px;
}

.addBtn { background:#1faa00; color:white; }
.descBtn { background:#4da6ff; color:white; }

/* cart */
#cartBtn {
    position: fixed;
    top: 15px;
    right: 15px;
    background: #111;
    color: white;
    padding: 10px;
    border-radius: 12px;
}
</style>
</head>

<body>

<header>
    <div class="brand">NEON || 3D Печать</div>

    <div class="subtitle">
        Маркетплейс 3D-моделей и печатных изделий.  
        Делаем уникальные декоративные объекты: вазы, бюсты, интерьерные изделия и кастомные модели под заказ.  
        Быстрое изготовление, аккуратная печать, доставка по договорённости.
    </div>
</header>

<div id="cartBtn">🛒 <span id="count">0</span></div>

<div class="container" id="shop"></div>

<script>

let products = [
    {name:"Ваза спираль", price:600, desc:"Декоративная ваза", size:"140×139×219 мм"},
    {name:"Бюст Сталина", price:1200, desc:"Классический бюст", size:"176×128×245 мм"},
    {name:"Ваза сердце", price:360, desc:"Форма сердца", size:"200×70 мм"}
];

let cart = JSON.parse(localStorage.getItem("cart") || "[]");

function save(){
    localStorage.setItem("cart", JSON.stringify(cart));
}

function render(){
    let html="";
    products.forEach((p,i)=>{
        html+=`
        <div class="card">
            <b>${p.name}</b><br>
            ${p.price} ₽

            <button class="addBtn" onclick="add(${i})">В корзину</button>
            <button class="descBtn" onclick="alert('${p.desc}\\n${p.size}')">Описание</button>
        </div>`;
    });
    document.getElementById("shop").innerHTML=html;
}

function add(i){
    cart.push(products[i]);
    save();
    document.getElementById("count").innerText=cart.length;
}

render();

</script>

</body>
</html>
