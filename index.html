<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NEON || Магазин</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; margin:0; background:#f6f6f6; }

header {
  padding:20px;
  background:white;
  font-weight:bold;
  position:sticky;
  top:0;
}

.container {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:20px;
  padding:20px;
}

.card {
  background:white;
  border-radius:12px;
  padding:15px;
  cursor:pointer;
  transition:0.2s;
}

.card:hover { transform:scale(1.03); }

.price { color:#666; margin-top:5px; }

</style>
</head>

<body>

<header>NEON || Магазин</header>

<div class="container" id="shop"></div>

<script>

let products = [
  {id:1, name:"Ваза спиралевидная", price:600},
  {id:2, name:"Бюст Сталина", price:1200}
];

function render(){
  let html="";
  products.forEach(p=>{
    html += `
      <div class="card" onclick="openProduct(${p.id})">
        <div><b>${p.name}</b></div>
        <div class="price">${p.price} ₽</div>
      </div>
    `;
  });

  document.getElementById("shop").innerHTML = html;
}

function openProduct(id){
  window.location.href = "product.html?id=" + id;
}

render();

</script>

</body>
</html>
