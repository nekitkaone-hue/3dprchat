<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NEON || 3D Печать</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial;
    background: #f6f6f6;
    color: #111;
}

header {
    position: sticky;
    top: 0;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    padding: 18px 30px;
    font-size: 20px;
    font-weight: 600;
    border-bottom: 1px solid #eee;
}

#cartBtn {
    position: fixed;
    right: 20px;
    top: 15px;
    background: #111;
    color: white;
    padding: 10px 14px;
    border-radius: 12px;
    cursor: pointer;
    z-index: 1000;
}

.container {
    max-width: 1100px;
    margin: auto;
    padding: 30px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 20px;
}

/* CARD */
.card {
    background: white;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 6px 20px rgba(0,0,0,0.06);
    transition: 0.2s;
}

.card:hover {
    transform: translateY(-4px);
}

.card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    background: #f0f0f0;
}

.content {
    padding: 15px;
}

.title {
    font-size: 16px;
    font-weight: 600;
}

.price {
    margin-top: 5px;
    color: #666;
}

button {
    margin-top: 10px;
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #111;
    color: white;
    font-weight: 500;
    cursor: pointer;
}

/* CART */
#cart {
    position: fixed;
    right: -400px;
    top: 0;
    width: 340px;
    height: 100%;
    background: white;
    box-shadow: -10px 0 30px rgba(0,0,0,0.1);
    padding: 20px;
    transition: 0.35s;
    z-index: 999;
}

#cart.open {
    right: 0;
}

#overlay {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.4);
    opacity:0;
    visibility:hidden;
    transition:0.3s;
    z-index:998;
}

#overlay.show {
    opacity:1;
    visibility:visible;
}

#closeCart {
    position: absolute;
    top: 10px;
    right: 15px;
    font-size: 26px;
    cursor: pointer;
}

.cart-item {
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid #eee;
}

.del {
    background:red;
    padding:5px 8px;
    border-radius:6px;
    font-size:12px;
    width:auto;
}

#checkout, #clearCart {
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}

#checkout { background:#111; color:white; }
#clearCart { background:#444; color:white; }

.fly {
    position: fixed;
    z-index: 2000;
    font-size: 30px;
    pointer-events: none;
    transition: 0.6s ease;
}
</style>
</head>

<body>

<header>NEON || 3D Печать</header>

<div id="cartBtn" onclick="toggleCart()">🛒 <span id="count">0</span></div>

<div class="container" id="shop"></div>

<div id="overlay" onclick="toggleCart()"></div>

<!-- CART -->
<div id="cart">
    <div id="closeCart" onclick="toggleCart()">×</div>

    <h3>Корзина</h3>
    <div id="items"></div>
    <p id="total">Итого: 0 ₽</p>

    <button id="checkout" onclick="send()">Заказать</button>
    <button id="clearCart" onclick="clearCart()">Очистить корзину</button>
</div>

<script>

const tgUser = "nekitka_one";

/* 🛍 ТОВАРЫ */
let products = [
    {
        name: "Ваза спиралевидная",
        price: 600,
        img: "https://via.placeholder.com/400x300?text=Vase"
    },
    {
        name: "Бюст Сталина",
        price: 1200,
        img: "https://via.placeholder.com/400x300?text=White+Bust+Statue"
    }
];

/* CART */
let cart = JSON.parse(localStorage.getItem("cart") || "[]");

function saveCart(){
    localStorage.setItem("cart", JSON.stringify(cart));
}

/* RENDER */
function render(){
    let html = "";

    products.forEach((p,i)=>{
        html += `
        <div class="card">
            <img src="${p.img}" alt="product">

            <div class="content">
                <div class="title">${p.name}</div>
                <div class="price">${p.price} ₽</div>
                <button onclick="add(${i}, event)">В корзину</button>
            </div>
        </div>`;
    });

    document.getElementById("shop").innerHTML = html;
}

/* ADD + ANIMATION */
function add(i, e){

    // вибрация
    if(navigator.vibrate){
        navigator.vibrate(50);
    }

    // летящий товар
    let fly = document.createElement("div");
    fly.className = "fly";
    fly.innerText = "📦";

    let rect = e.target.getBoundingClientRect();
    fly.style.left = rect.left + "px";
    fly.style.top = rect.top + "px";

    document.body.appendChild(fly);

    let cartBtn = document.getElementById("cartBtn").getBoundingClientRect();

    setTimeout(()=>{
        fly.style.left = cartBtn.left + "px";
        fly.style.top = cartBtn.top + "px";
        fly.style.transform = "scale(0.2)";
        fly.style.opacity = "0";
    }, 10);

    setTimeout(()=> fly.remove(), 600);

    cart.push(products[i]);
    saveCart();
    update();
}

/* REMOVE */
function removeItem(i){
    cart.splice(i,1);
    saveCart();
    update();
}

/* CLEAR */
function clearCart(){
    cart = [];
    saveCart();
    update();
}

/* UPDATE */
function update(){
    document.getElementById("count").innerText = cart.length;

    let html = "";
    let sum = 0;

    cart.forEach((p,i)=>{
        sum += p.price;
        html += `
        <div class="cart-item">
            ${p.name} — ${p.price} ₽
            <button class="del" onclick="removeItem(${i})">×</button>
        </div>`;
    });

    document.getElementById("items").innerHTML = html;
    document.getElementById("total").innerText = "Итого: " + sum + " ₽";
}

/* CART TOGGLE */
function toggleCart(){
    let c = document.getElementById("cart");
    let o = document.getElementById("overlay");

    c.classList.toggle("open");
    o.classList.toggle("show");
}

/* ORDER */
function send(){
    let text = "Заказ:%0A";
    let sum = 0;

    cart.forEach(p=>{
        text += "- " + p.name + " (" + p.price + "₽)%0A";
        sum += p.price;
    });

    text += "%0AИтого: " + sum + "₽";

    window.open("https://t.me/" + tgUser + "?text=" + text, "_blank");
}

render();
update();

</script>

</body>
</html>
