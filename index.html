<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NEON 3D</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f6f7fb;
    overflow-x: hidden;
}

/* мягкий фон */
body::before {
    content:"";
    position:fixed;
    inset:-20%;
    background:
        radial-gradient(circle at 20% 20%, rgba(120,160,255,0.10), transparent 40%),
        radial-gradient(circle at 80% 30%, rgba(180,200,255,0.10), transparent 45%),
        radial-gradient(circle at 40% 80%, rgba(200,220,255,0.08), transparent 50%);
    z-index:-1;
}

/* header */
header {
    position: sticky;
    top: 0;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    padding: 16px;
    font-weight: 600;
    border-bottom: 1px solid #eee;
}

/* grid */
.container {
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
}

/* card */
.card {
    background: white;
    border-radius: 16px;
    padding: 14px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

/* buttons */
button {
    width: 100%;
    margin-top: 6px;
    padding: 10px;
    border: none;
    border-radius: 10px;
}

.addBtn { background: #1faa00; color: white; }
.descBtn { background: #4da6ff; color: white; }

/* cart */
#cartBtn {
    position: fixed;
    top: 15px;
    right: 15px;
    background: #111;
    color: white;
    padding: 10px;
    border-radius: 12px;
}

#cart {
    position: fixed;
    right: -400px;
    top: 0;
    width: 320px;
    height: 100%;
    background: white;
    padding: 15px;
    transition: 0.3s;
}

#cart.open {
    right: 0;
}

#overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    opacity: 0;
    visibility: hidden;
}

#overlay.show {
    opacity: 1;
    visibility: visible;
}
</style>
</head>

<body>

<header>NEON 3D PRINT</header>

<div id="cartBtn" onclick="toggleCart()">🛒 <span id="count">0</span></div>
<div id="overlay" onclick="toggleCart()"></div>

<div class="container" id="shop"></div>

<div id="cart">
    <h3>Корзина</h3>
    <div id="items"></div>
    <p id="total"></p>
    <button onclick="clearCart()" style="background:red;color:white;">Очистить</button>
</div>

<!-- POPUP -->
<div id="popup" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;">
    <div style="background:white;padding:20px;border-radius:12px;width:280px;">
        <h3 id="pname"></h3>
        <p id="pdesc"></p>
        <p id="psize"></p>
        <button onclick="closePopup()">Закрыть</button>
    </div>
</div>

<script>

let products = [
    {name:"Ваза спираль", price:600, desc:"Ваза", size:"140×139×219 мм"},
    {name:"Бюст Сталина", price:1200, desc:"Бюст", size:"176×128×245 мм"},
    {name:"Ваза сердце", price:360, desc:"Сердце", size:"200×70 мм"}
];

let cart = JSON.parse(localStorage.getItem("cart") || "[]");

function save(){
    localStorage.setItem("cart", JSON.stringify(cart));
}

function render(){
    let html="";
    products.forEach((p,i)=>{
        html+=`
        <div class="card">
            <b>${p.name}</b><br>
            ${p.price} ₽
            <button class="addBtn" onclick="add(${i})">В корзину</button>
            <button class="descBtn" onclick="show(${i})">Описание</button>
        </div>`;
    });
    document.getElementById("shop").innerHTML=html;
}

function add(i){
    cart.push(products[i]);
    save();
    update();
}

function update(){
    document.getElementById("count").innerText=cart.length;

    let html="";
    let sum=0;

    cart.forEach(p=>{
        sum+=p.price;
        html+=`<div>${p.name}</div>`;
    });

    document.getElementById("items").innerHTML=html;
    document.getElementById("total").innerText="Итого: "+sum+" ₽";
}

function clearCart(){
    cart=[];
    save();
    update();
}

function toggleCart(){
    document.getElementById("cart").classList.toggle("open");
    document.getElementById("overlay").classList.toggle("show");
}

function show(i){
    document.getElementById("popup").style.display="flex";
    document.getElementById("pname").innerText=products[i].name;
    document.getElementById("pdesc").innerText=products[i].desc;
    document.getElementById("psize").innerText=products[i].size;
}

function closePopup(){
    document.getElementById("popup").style.display="none";
}

render();
update();

</script>

</body>
</html>
