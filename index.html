<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NEON || 3D Печать</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0a0a0a;
    color: white;
}

header {
    padding: 20px;
    display: flex;
    justify-content: space-between;
}

.container {
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.card {
    background: #111;
    padding: 15px;
    border-radius: 10px;
    border: 1px solid #00f0ff33;
}

model-viewer {
    width: 100%;
    height: 200px;
    background: black;
    border-radius: 10px;
}

button {
    width: 100%;
    padding: 10px;
    background: #00f0ff;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

/* ADMIN */
#adminPanel {
    display: none;
    position: fixed;
    top: 0;
    right: 0;
    width: 300px;
    height: 100%;
    background: #111;
    padding: 15px;
    overflow-y: auto;
    border-left: 2px solid #00f0ff;
}

input {
    width: 100%;
    padding: 8px;
    margin: 5px 0;
}

.small {
    font-size: 12px;
    color: gray;
}
</style>
</head>

<body>

<header>
    <h2>NEON || 3D Печать</h2>
    <button onclick="openAdmin()">Админ</button>
</header>

<div class="container" id="products"></div>

<!-- ADMIN PANEL -->
<div id="adminPanel">

    <h3>Админ панель</h3>

    <div id="loginBox">
        <input type="password" id="pass" placeholder="Пароль">
        <button onclick="login()">Войти</button>
    </div>

    <div id="panel" style="display:none;">

        <input id="name" placeholder="Название">
        <input id="price" placeholder="Цена">
        <input id="model" placeholder="3D модель (.glb ссылка)">

        <button onclick="add()">Добавить товар</button>

        <hr>

        <div id="list"></div>
    </div>
</div>

<script>

const PASSWORD = "neon123"; // 🔑 пароль админки
const tgUser = "YOUR_USERNAME"; // Telegram

function openAdmin(){
    document.getElementById("adminPanel").style.display = "block";
}

function login(){
    if(document.getElementById("pass").value === PASSWORD){
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("panel").style.display = "block";
        render();
    } else {
        alert("Неверный пароль");
    }
}

/* PRODUCTS */
function get(){
    return JSON.parse(localStorage.getItem("products") || "[]");
}

function save(data){
    localStorage.setItem("products", JSON.stringify(data));
    render();
    loadProducts();
}

function add(){
    let data = get();

    data.push({
        name: name.value,
        price: price.value,
        model: model.value
    });

    save(data);
}

function del(i){
    let data = get();
    data.splice(i,1);
    save(data);
}

function render(){
    let data = get();
    let html = "";

    data.forEach((p,i)=>{
        html += `
        <div>
            <b>${p.name}</b> - €${p.price}
            <button onclick="del(${i})">Удалить</button>
        </div>`;
    });

    document.getElementById("list").innerHTML = html;
}

/* SHOP */
function loadProducts(){
    let data = get();
    let html = "";

    data.forEach(p=>{
        html += `
        <div class="card">
            <model-viewer src="${p.model}" auto-rotate camera-controls></model-viewer>
            <h3>${p.name}</h3>
            <p>€${p.price}</p>
            <button onclick="order('${p.name}')">Заказать</button>
        </div>`;
    });

    document.getElementById("products").innerHTML = html;
}

function order(name){
    window.open("https://t.me/" + tgUser + "?text=Хочу заказать: " + name);
}

loadProducts();

</script>

</body>
</html>
