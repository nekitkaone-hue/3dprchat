<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NEON || 3D Печать</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial;
    background: #f6f7fb;
}

/* HEADER */
header {
    position: sticky;
    top: 0;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    padding: 16px;
    border-bottom: 1px solid #eee;
}

.brand {
    font-size: 18px;
    font-weight: 700;
}

/* GRID */
.container {
    padding: 15px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
}

/* CARD */
.card {
    background: white;
    border-radius: 16px;
    padding: 14px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

/* BUTTONS */
button {
    width: 100%;
    margin-top: 6px;
    padding: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

.add { background:#1faa00; color:white; }
.desc { background:#4da6ff; color:white; }

/* CART BTN */
#cartBtn {
    position: fixed;
    right: 15px;
    top: 15px;
    background: #111;
    color: white;
    padding: 10px 12px;
    border-radius: 12px;
}

/* CART */
#cart {
    position: fixed;
    right: -380px;
    top: 0;
    width: 320px;
    height: 100%;
    background: white;
    box-shadow: -10px 0 25px rgba(0,0,0,0.1);
    padding: 15px;
    transition: 0.3s;
    z-index: 999;
}

#cart.open {
    right: 0;
}

.item {
    display:flex;
    justify-content:space-between;
    padding:8px 0;
    border-bottom:1px solid #eee;
}

.del {
    background:red;
    color:white;
    border:none;
    padding:5px 8px;
    border-radius:6px;
}

/* OVERLAY */
#overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    opacity: 0;
    visibility: hidden;
}

#overlay.show {
    opacity: 1;
    visibility: visible;
}

/* POPUP */
#popup {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.5);
}

.popupBox {
    background: white;
    padding: 20px;
    border-radius: 14px;
    width: 280px;
    text-align: center;
}
</style>
</head>

<body>

<header>
    <div class="brand">NEON || 3D Печать</div>
</header>

<div id="cartBtn" onclick="toggleCart()">🛒 <span id="count">0</span></div>
<div id="overlay" onclick="toggleCart()"></div>

<div class="container" id="shop"></div>

<!-- CART -->
<div id="cart">
    <h3>Корзина</h3>
    <div id="items"></div>
    <p id="total"></p>
    <button onclick="clearCart()" style="background:red;color:white;">Очистить</button>
</div>

<!-- POPUP -->
<div id="popup">
    <div class="popupBox">
        <h3 id="pname"></h3>
        <p id="pdesc"></p>
        <p id="psize"></p>
        <button onclick="closePopup()">Закрыть</button>
    </div>
</div>

<script>

/* PRODUCTS */
let products = [
    {name:"Ваза спираль", price:600, desc:"Декоративная ваза", size:"140×139×219 мм"},
    {name:"Бюст Сталина", price:1200, desc:"Классический бюст", size:"176×128×245 мм"},
    {name:"Ваза сердце", price:360, desc:"Форма сердца", size:"200×70 мм"}
];

let cart = JSON.parse(localStorage.getItem("cart") || "[]");

/* SAVE */
function save(){
    localStorage.setItem("cart", JSON.stringify(cart));
}

/* RENDER */
function render(){
    let html="";
    products.forEach((p,i)=>{
        html+=`
        <div class="card">
            <b>${p.name}</b><br>
            ${p.price} ₽

            <button class="add" onclick="add(${i})">В корзину</button>
            <button class="desc" onclick="show(${i})">Описание</button>
        </div>`;
    });
    document.getElementById("shop").innerHTML=html;
}

/* ADD CART */
function add(i){
    cart.push(products[i]);
    save();
    update();
}

/* UPDATE CART */
function update(){
    document.getElementById("count").innerText=cart.length;

    let html="";
    let sum=0;

    cart.forEach((p,i)=>{
        sum+=p.price;

        html+=`
        <div class="item">
            ${p.name}
            <button class="del" onclick="removeItem(${i})">×</button>
        </div>`;
    });

    document.getElementById("items").innerHTML=html;
    document.getElementById("total").innerText="Итого: "+sum+" ₽";
}

/* REMOVE */
function removeItem(i){
    cart.splice(i,1);
    save();
    update();
}

/* CLEAR */
function clearCart(){
    cart=[];
    save();
    update();
}

/* CART TOGGLE */
function toggleCart(){
    document.getElementById("cart").classList.toggle("open");
    document.getElementById("overlay").classList.toggle("show");
}

/* DESCRIPTION FIXED */
function show(i){
    document.getElementById("popup").style.display="flex";
    document.getElementById("pname").innerText=products[i].name;
    document.getElementById("pdesc").innerText=products[i].desc;
    document.getElementById("psize").innerText=products[i].size;
}

function closePopup(){
    document.getElementById("popup").style.display="none";
}

/* INIT */
render();
update();

</script>

</body>
</html>
