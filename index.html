<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NEON || 3D Печать</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="favicon.png">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f6f7fb;
}

/* HEADER */
header{
    position:sticky;
    top:0;
    background:white;
    padding:16px;
    font-weight:700;
    border-bottom:1px solid #eee;
    cursor:pointer;
}

/* SHOP */
.container{
    padding:15px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:12px;
}

.card{
    background:white;
    padding:14px;
    border-radius:14px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

/* IMAGE */
.card img{
    width:100%;
    border-radius:10px;
    margin-bottom:8px;
}

/* BUTTONS */
button{
    width:100%;
    margin-top:6px;
    padding:8px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.add{background:green;color:white;}
.desc{background:#4da6ff;color:white;}

/* CART BTN */
#cartBtn{
    position:fixed;
    right:15px;
    top:15px;
    background:black;
    color:white;
    padding:10px 12px;
    border-radius:12px;
}

/* CART */
#cart{
    position:fixed;
    right:-380px;
    top:0;
    width:340px;
    height:100%;
    background:white;
    padding:15px;
    transition:.3s;
    overflow:auto;
}

#cart.open{right:0;}

.cartTop{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* CLOSE */
.closeCart{
    width:auto;
    background:#eee;
}

/* ITEMS */
.item{
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid #eee;
}

/* QTY */
.qty{
    display:flex;
    gap:5px;
    align-items:center;
}

.qty button{
    width:26px;
    height:26px;
    background:#2ecc71;
    color:white;
}

/* ORDER */
.order{
    background:#111;
    color:white;
}

.clearBottom{
    background:red;
    color:white;
}

/* OVERLAY */
#overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.3);
    display:none;
}
#overlay.show{display:block;}

/* POPUP */
#popup{
    position:fixed;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,0.5);
}

.popupBox{
    background:white;
    padding:20px;
    border-radius:12px;
    width:280px;
}
</style>
</head>

<body>

<header onclick="location.reload()">NEON || 3D Печать</header>

<div id="cartBtn" onclick="toggleCart()">🛒 <span id="count">0</span></div>
<div id="overlay" onclick="toggleCart()"></div>

<div class="container" id="shop"></div>

<!-- CART -->
<div id="cart">
    <div class="cartTop">
        <h3>Корзина</h3>
        <button class="closeCart" onclick="toggleCart()">✕</button>
    </div>

    <div id="items"></div>
    <p id="total">Итого: 0 ₽</p>

    <button class="order" onclick="order()">Оформить заказ</button>
    <button class="clearBottom" onclick="clearCart()">Очистить корзину</button>
</div>

<!-- POPUP -->
<div id="popup">
    <div class="popupBox">
        <h3 id="pname"></h3>
        <p id="pdesc"></p>
        <p id="psize"></p>
        <button onclick="closePopup()">Закрыть</button>
    </div>
</div>

<script>

/* PRODUCTS */
let products=[
    {
        name:"Ваза спиралевидная",
        price:600,
        desc:"Элегантная декоративная ваза с плавной спиральной формой, создающая эффект движения и игры света.",
        size:"140×139×219 мм",
        image:"images/vase1.jpg"
    },
    {
        name:"Бюст Сталина",
        price:1200,
        desc:"Декоративный бюст в классическом стиле.",
        size:"176×128×245 мм",
        image:"images/stalin.jpg"
    },
    {
        name:"Ваза сердце в руках",
        price:360,
        desc:"Художественная ваза в виде рук, держащих сердце.",
        size:"200×70 мм",
        image:"images/heart.jpg"
    }
];

let cart=JSON.parse(localStorage.getItem("cart")||"[]");

cart=cart.map(p=>({
    id:p.id??0,
    name:p.name??"",
    price:Number(p.price)||0,
    qty:Number(p.qty)||1
}));

function save(){
    localStorage.setItem("cart",JSON.stringify(cart));
}

/* ADD */
function add(i){
    let f=cart.find(p=>p.id===i);

    if(f){f.qty++;}
    else{
        cart.push({
            id:i,
            name:products[i].name,
            price:products[i].price,
            qty:1
        });
    }

    save();
    update();
}

/* QTY */
function plus(i){cart[i].qty++;save();update();}
function minus(i){
    cart[i].qty--;
    if(cart[i].qty<=0) cart.splice(i,1);
    save();update();
}

/* CLEAR */
function clearCart(){cart=[];save();update();}

/* SHOP */
function render(){
    let html="";
    products.forEach((p,i)=>{
        html+=`
        <div class="card">
            <img src="${p.image}">
            <b>${p.name}</b><br>
            ${p.price} ₽
            <button class="add" onclick="add(${i})">В корзину</button>
            <button class="desc" onclick="show(${i})">Описание</button>
        </div>`;
    });
    shop.innerHTML=html;
}

/* CART */
function update(){
    let html="",sum=0,count=0;

    cart.forEach((p,i)=>{
        sum+=p.price*p.qty;
        count+=p.qty;

        html+=`
        <div class="item">
            <div>${p.name}<br><b>${p.price*p.qty} ₽</b></div>
            <div class="qty">
                <button onclick="minus(${i})">-</button>
                ${p.qty}
                <button onclick="plus(${i})">+</button>
            </div>
        </div>`;
    });

    items.innerHTML=html;
    total.innerText="Итого: "+sum+" ₽";
    countEl=document.getElementById("count");
    countEl.innerText=count;
}

/* ORDER */
function order(){
    if(cart.length===0)return alert("Корзина пуста");

    let text="🛒 Заказ:%0A%0A",sum=0;

    cart.forEach(p=>{
        let t=p.price*p.qty;
        text+=`${p.name} x${p.qty} = ${t} ₽%0A`;
        sum+=t;
    });

    text+=`%0A💰 ИТОГО: ${sum} ₽`;

    window.open(`https://t.me/nekitka_one?text=${text}`);
}

/* POPUP */
function show(i){
    popup.style.display="flex";
    pname.innerText=products[i].name;
    pdesc.innerText=products[i].desc;
    psize.innerText=products[i].size;
}

function closePopup(){popup.style.display="none";}

/* CART */
function toggleCart(){
    cartEl=document.getElementById("cart");
    overlay=document.getElementById("overlay");

    cartEl.classList.toggle("open");
    overlay.classList.toggle("show");
}

render();
update();

</script>

</body>
</html>
