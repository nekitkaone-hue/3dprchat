<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NEON || 3D Печать</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f6f7fb;
}

/* HEADER */
header{
    position:sticky;
    top:0;
    background:white;
    padding:16px;
    font-weight:700;
    border-bottom:1px solid #eee;
    cursor:pointer;
}

/* SHOP */
.container{
    padding:15px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:12px;
}

.card{
    background:white;
    padding:14px;
    border-radius:14px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

button{
    width:100%;
    margin-top:6px;
    padding:8px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.add{background:green;color:white;}
.desc{background:#4da6ff;color:white;}

/* CART */
#cartBtn{
    position:fixed;
    right:15px;
    top:15px;
    background:black;
    color:white;
    padding:10px 12px;
    border-radius:12px;
}

#cart{
    position:fixed;
    right:-380px;
    top:0;
    width:340px;
    height:100%;
    background:white;
    padding:15px;
    transition:.3s;
    overflow:auto;
}

#cart.open{right:0;}

/* CART HEADER ROW */
.cartTop{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
}

/* CLEAR BUTTON (TOP RIGHT) */
.clearTop{
    background:#ff3b30;
    color:white;
    width:auto;
    padding:6px 10px;
    font-size:12px;
}

/* ITEMS */
.item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 0;
    border-bottom:1px solid #eee;
}

.qty{
    display:flex;
    align-items:center;
    gap:5px;
}

/* 🔥 + / - GREEN */
.qty button{
    width:26px;
    height:26px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#2ecc71; /* GREEN */
    color:white;
    font-weight:bold;
}

/* 🔴 DELETE */
.del{
    width:26px;
    height:26px;
    background:#ff3b30;
    color:white;
    font-weight:bold;
}

/* ORDER */
.order{
    background:#111;
    color:white;
    margin-top:10px;
}

/* overlay */
#overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.35);
    opacity:0;
    visibility:hidden;
}

#overlay.show{
    opacity:1;
    visibility:visible;
}

/* popup */
#popup{
    position:fixed;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,0.5);
}

.popupBox{
    background:white;
    padding:20px;
    border-radius:12px;
    width:280px;
}
</style>
</head>

<body>

<header onclick="location.reload()">NEON || 3D Печать</header>

<div id="cartBtn" onclick="toggleCart()">🛒 <span id="count">0</span></div>
<div id="overlay" onclick="toggleCart()"></div>

<div class="container" id="shop"></div>

<!-- CART -->
<div id="cart">

    <div class="cartTop">
        <h3 style="margin:0;">Корзина</h3>

        <!-- 🔥 MOVED CLEAR BUTTON -->
        <button class="clearTop" onclick="clearCart()">Очистить</button>
    </div>

    <div id="items"></div>
    <p id="total">Итого: 0 ₽</p>

    <button class="order" onclick="order()">Оформить заказ</button>
</div>

<!-- POPUP -->
<div id="popup">
    <div class="popupBox">
        <h3 id="pname"></h3>
        <p id="pdesc"></p>
        <p id="psize"></p>
        <button onclick="closePopup()">Закрыть</button>
    </div>
</div>

<script>

let products=[
    {name:"Ваза спираль",price:600,desc:"Декоративная ваза",size:"140×139×219 мм"},
    {name:"Бюст Сталина",price:1200,desc:"Классический бюст",size:"176×128×245 мм"},
    {name:"Ваза сердце",price:360,desc:"Форма сердца",size:"200×70 мм"}
];

let cart=JSON.parse(localStorage.getItem("cart")||"[]");

/* FIX DATA */
cart = (cart||[]).map(p=>({
    id:p.id??0,
    name:p.name??"Товар",
    price:Number(p.price)||0,
    qty:Number(p.qty)||1
}));

function save(){
    localStorage.setItem("cart",JSON.stringify(cart));
}

/* ADD */
function add(i){
    let f=cart.find(p=>p.id===i);

    if(f){
        f.qty++;
    }else{
        cart.push({
            id:i,
            name:products[i].name,
            price:Number(products[i].price),
            qty:1
        });
    }

    save();
    update();
}

/* QTY */
function plus(i){
    cart[i].qty++;
    save();
    update();
}

function minus(i){
    cart[i].qty--;
    if(cart[i].qty<=0) cart.splice(i,1);
    save();
    update();
}

function remove(i){
    cart.splice(i,1);
    save();
    update();
}

function clearCart(){
    cart=[];
    save();
    update();
}

/* SHOP */
function render(){
    let html="";
    products.forEach((p,i)=>{
        html+=`
        <div class="card">
            <b>${p.name}</b><br>
            ${p.price} ₽

            <button class="add" onclick="add(${i})">В корзину</button>
            <button class="desc" onclick="show(${i})">Описание</button>
        </div>`;
    });
    document.getElementById("shop").innerHTML=html;
}

/* CART */
function update(){
    let html="";
    let sum=0;
    let count=0;

    cart.forEach((p,i)=>{
        let price=Number(p.price)||0;
        let qty=Number(p.qty)||0;

        sum+=price*qty;
        count+=qty;

        html+=`
        <div class="item">
            <div>
                ${p.name}<br>
                <b>${price*qty} ₽</b>
            </div>

            <div class="qty">
                <button onclick="minus(${i})">-</button>
                ${qty}
                <button onclick="plus(${i})">+</button>
                <button class="del" onclick="remove(${i})">×</button>
            </div>
        </div>`;
    });

    document.getElementById("items").innerHTML=html;
    document.getElementById("total").innerText="Итого: "+sum+" ₽";
    document.getElementById("count").innerText=count;
}

/* ORDER */
function order(){
    if(cart.length===0){
        alert("Корзина пуста");
        return;
    }

    let text="🛒 Заказ:%0A%0A";
    let sum=0;

    cart.forEach(p=>{
        let price=Number(p.price)||0;
        let qty=Number(p.qty)||1;

        let total=price*qty;

        text+=`${p.name} x${qty} = ${total} ₽%0A`;
        sum+=total;
    });

    text+=`%0A💰 ИТОГО: ${sum} ₽`;

    window.open(`https://t.me/nekitka_one?text=${text}`,"_blank");
}

/* DESCRIPTION */
function show(i){
    document.getElementById("popup").style.display="flex";
    document.getElementById("pname").innerText=products[i].name;
    document.getElementById("pdesc").innerText=products[i].desc;
    document.getElementById("psize").innerText=products[i].size;
}

function closePopup(){
    document.getElementById("popup").style.display="none";
}

/* CART TOGGLE */
function toggleCart(){
    document.getElementById("cart").classList.toggle("open");
    document.getElementById("overlay").classList.toggle("show");
}

render();
update();

</script>

</body>
</html>
