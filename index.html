<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NEON || 3D Печать</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f7;
    color: #111;
}

/* HEADER */
header {
    padding: 25px;
    text-align: center;
    font-size: 30px;
    font-weight: bold;
    letter-spacing: 2px;
    background: white;
    border-bottom: 1px solid #ddd;
}

/* GRID */
.container {
    padding: 30px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 25px;
}

/* CARD */
.card {
    background: white;
    border-radius: 15px;
    padding: 15px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.08);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

/* 3D VIEW */
model-viewer {
    width: 100%;
    height: 220px;
    border-radius: 12px;
    background: #eee;
}

/* TEXT */
h3 {
    margin: 10px 0 5px;
}

p {
    color: #666;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: black;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #333;
}
</style>
</head>

<body>

<header>NEON || 3D Печать</header>

<div class="container" id="shop"></div>

<script>

/* 🛍 ТОВАРЫ */
let products = [
    {
        name: "3D Меч",
        price: "15",
        model: "https://model.glb"
    },
    {
        name: "Фигурка Дракона",
        price: "25",
        model: "https://model.glb"
    }
];

const tgUser = "YOUR_USERNAME";

/* РЕНДЕР МАГАЗИНА */
function renderShop(){
    let html = "";

    products.forEach(p=>{
        html += `
        <div class="card">
            <model-viewer src="${p.model}" auto-rotate camera-controls></model-viewer>
            <h3>${p.name}</h3>
            <p>€${p.price}</p>
            <button onclick="order('${p.name}')">Заказать</button>
        </div>`;
    });

    document.getElementById("shop").innerHTML = html;
}

/* ЗАКАЗ */
function order(name){
    window.open("https://t.me/" + tgUser + "?text=Хочу заказать: " + name);
}

renderShop();

</script>

</body>
</html>
