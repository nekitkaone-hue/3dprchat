<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NEON || 3D Печать</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f6f7fb;
}

header {
    position: sticky;
    top: 0;
    background: white;
    padding: 16px;
    font-weight: 700;
    border-bottom: 1px solid #eee;
}

.container {
    padding: 15px;
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(180px,1fr));
    gap: 12px;
}

.card {
    background: white;
    padding: 14px;
    border-radius: 14px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

button {
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

/* CART BTN */
#cartBtn {
    position: fixed;
    right: 15px;
    top: 15px;
    background: black;
    color: white;
    padding: 10px 12px;
    border-radius: 12px;
}

/* CART */
#cart {
    position: fixed;
    right: -380px;
    top: 0;
    width: 340px;
    height: 100%;
    background: white;
    transition: 0.3s;
    padding: 15px;
}

#cart.open { right: 0; }

.item {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 0;
    border-bottom:1px solid #eee;
    font-size: 14px;
}

/* qty controls */
.qty {
    display:flex;
    align-items:center;
    gap:5px;
}

.qty button {
    width: 22px;
    height: 22px;
    font-size: 14px;
    background:#eee;
}

.del {
    width: 22px;
    height: 22px;
    font-size: 12px;
    background:red;
    color:white;
}

/* overlay */
#overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    opacity: 0;
    visibility: hidden;
}

#overlay.show {
    opacity: 1;
    visibility: visible;
}
</style>
</head>

<body>

<header>NEON || 3D Печать</header>

<div id="cartBtn" onclick="toggleCart()">🛒 <span id="count">0</span></div>
<div id="overlay" onclick="toggleCart()"></div>

<div class="container" id="shop"></div>

<div id="cart">
    <h3>Корзина</h3>
    <div id="items"></div>
    <p id="total"></p>
</div>

<script>

/* PRODUCTS */
let products = [
    {name:"Ваза спираль", price:600},
    {name:"Бюст Сталина", price:1200},
    {name:"Ваза сердце", price:360}
];

/* CART WITH QUANTITY */
let cart = JSON.parse(localStorage.getItem("cart") || "[]");

/* SAVE */
function save(){
    localStorage.setItem("cart", JSON.stringify(cart));
}

/* ADD */
function add(i){
    let found = cart.find(p => p.id === i);

    if(found){
        found.qty++;
    } else {
        cart.push({
            id:i,
            name:products[i].name,
            price:products[i].price,
            qty:1
        });
    }

    save();
    update();
}

/* REMOVE ITEM */
function remove(i){
    cart.splice(i,1);
    save();
    update();
}

/* PLUS MINUS */
function plus(i){
    cart[i].qty++;
    save();
    update();
}

function minus(i){
    cart[i].qty--;
    if(cart[i].qty <= 0){
        cart.splice(i,1);
    }
    save();
    update();
}

/* RENDER SHOP */
function render(){
    let html="";
    products.forEach((p,i)=>{
        html+=`
        <div class="card">
            <b>${p.name}</b><br>
            ${p.price} ₽
            <button onclick="add(${i})" style="background:green;color:white;width:100%;margin-top:6px;padding:8px;">
                В корзину
            </button>
        </div>`;
    });
    document.getElementById("shop").innerHTML=html;
}

/* UPDATE CART */
function update(){
    let html="";
    let sum=0;
    let count=0;

    cart.forEach((p,i)=>{
        sum += p.price * p.qty;
        count += p.qty;

        html+=`
        <div class="item">
            <div>
                ${p.name}<br>
                <b>${p.price * p.qty} ₽</b>
            </div>

            <div class="qty">
                <button onclick="minus(${i})">-</button>
                ${p.qty}
                <button onclick="plus(${i})">+</button>
                <button class="del" onclick="remove(${i})">×</button>
            </div>
        </div>`;
    });

    document.getElementById("items").innerHTML=html;
    document.getElementById("total").innerText="Итого: "+sum+" ₽";
    document.getElementById("count").innerText=count;
}

/* CART TOGGLE */
function toggleCart(){
    document.getElementById("cart").classList.toggle("open");
    document.getElementById("overlay").classList.toggle("show");
}

/* INIT */
render();
update();

</script>

</body>
</html>
