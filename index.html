<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NEON || 3D Печать</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0a0a0a;
    color: white;
}

header {
    padding: 20px;
    display: flex;
    justify-content: space-between;
}

.container {
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.card {
    background: #111;
    padding: 15px;
    border-radius: 10px;
    border: 1px solid #00f0ff33;
}

model-viewer {
    width: 100%;
    height: 200px;
    background: black;
    border-radius: 10px;
}

button {
    width: 100%;
    padding: 10px;
    background: #00f0ff;
    border: none;
    cursor: pointer;
    font-weight: bold;


input {
    width: 100%;
    padding: 8px;
    margin: 5px 0;
}
</style>
</head>

<body>

<header>
    <h2>NEON || 3D Печать</h2>
</header>

<div class="container" id="shop"></div>

<!-- ADMIN PANEL -->
<div id="admin">

<h3>Админка</h3>

<input id="name" placeholder="Название">
<input id="price" placeholder="Цена">
<input id="model" placeholder="3D ссылка (.glb)">

<button onclick="addProduct()">Добавить товар</button>

<hr>

<div id="list"></div>

</div>

<script>

const tgUser = "YOUR_USERNAME";

function getProducts(){
    return JSON.parse(localStorage.getItem("products") || "[]");
}

function saveProducts(data){
    localStorage.setItem("products", JSON.stringify(data));
    render();
    renderShop();
}

function addProduct(){
    let data = getProducts();

    let name = document.getElementById("name").value;
    let price = document.getElementById("price").value;
    let model = document.getElementById("model").value;

    if(!name  !price  !model){
        alert("Заполни все поля!");
        return;
    }

    data.push({name, price, model});

    saveProducts(data);
}

function deleteProduct(i){
    let data = getProducts();
    data.splice(i,1);
    saveProducts(data);
}

function render(){
    let data = getProducts();
    let html = "";

    data.forEach((p,i)=>{
        html += `
        <div>
            ${p.name} - €${p.price}
            <button onclick="deleteProduct(${i})">X</button>
        </div>`;
    });

    document.getElementById("list").innerHTML = html;
}

function renderShop(){
    let data = getProducts();
    let html = "";

    data.forEach(p=>{
        html += `
        <div class="card">
            <model-viewer src="${p.model}" auto-rotate camera-controls></model-viewer>
            <h3>${p.name}</h3>
            <p>€${p.price}</p>
            <button onclick="window.open('https://t.me/${tgUser}?text=Хочу заказать: ${p.name}')">
            Заказать
            </button>
        </div>`;
    });

    document.getElementById("shop").innerHTML = html;
}

render();
renderShop();

</script>

</body>
</html>
