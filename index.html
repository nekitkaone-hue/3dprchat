<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NEON || 3D Печать</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial;
    background: #f6f6f6;
    color: #111;
}

/* HEADER */
header {
    position: sticky;
    top: 0;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    padding: 18px 30px;
    font-size: 20px;
    font-weight: 600;
    border-bottom: 1px solid #eee;
}

/* CART BUTTON */
#cartBtn {
    position: fixed;
    right: 20px;
    top: 15px;
    background: #111;
    color: white;
    padding: 10px 14px;
    border-radius: 12px;
    cursor: pointer;
    z-index: 1000;
}

/* GRID */
.container {
    max-width: 1100px;
    margin: auto;
    padding: 30px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 20px;
}

/* CARD */
.card {
    background: white;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 6px 20px rgba(0,0,0,0.06);
    transition: 0.25s;
}

.card:hover {
    transform: translateY(-4px);
}

model-viewer {
    width: 100%;
    height: 220px;
    background: #fafafa;
}

/* TEXT */
.content {
    padding: 15px;
}

.title {
    font-size: 16px;
    font-weight: 600;
}

.price {
    margin-top: 5px;
    color: #666;
}

/* BUTTON */
button {
    margin-top: 10px;
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #111;
    color: white;
    font-weight: 500;
    cursor: pointer;
}

/* 🔳 OVERLAY */
#overlay {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.4);
    display: none;
    z-index: 998;
}

/* 🛒 CART (анимация как slide) */
#cart {
    position: fixed;
    right: -400px;
    top: 0;
    width: 340px;
    height: 100%;
    background: white;
    box-shadow: -10px 0 30px rgba(0,0,0,0.1);
    padding: 20px;
    transition: 0.3s ease;
    z-index: 999;
}

/* OPEN STATE */
#cart.open {
    right: 0;
}

/* ❌ CLOSE */
#closeCart {
    position: absolute;
    top: 10px;
    right: 15px;
    font-size: 26px;
    cursor: pointer;
    font-weight: bold;
}

.cart-item {
    padding: 10px 0;
    border-bottom: 1px solid #eee;
    font-size: 14px;
}

#checkout {
    margin-top: 20px;
    background: #111;
}
</style>
</head>

<body>

<header>NEON || 3D Печать</header>

<div id="cartBtn" onclick="toggleCart()">🛒 <span id="count">0</span></div>

<div class="container" id="shop"></div>

<div id="overlay" onclick="toggleCart()"></div>

<!-- CART -->
<div id="cart">
    <div id="closeCart" onclick="toggleCart()">×</div>

    <h3>Корзина</h3>
    <div id="items"></div>
    <p id="total">Итого: 0 ₽</p>

    <button id="checkout" onclick="send()">Заказать</button>
</div>

<script>

const tgUser = "nekitka_one";

/* 🛍 ТОВАРЫ */
let products = [
    {name:"3D Меч", price:1500, model:"https://model.glb"},
    {name:"Дракон", price:2500, model:"https://model.glb"},
    {name:"Ваза", price:600, model:""}
];

/* 🧠 LOAD CART */
let cart = JSON.parse(localStorage.getItem("cart") || "[]");

/* SAVE CART */
function saveCart(){
    localStorage.setItem("cart", JSON.stringify(cart));
}

/* SHOP */
function render(){
    let html = "";

    products.forEach((p,i)=>{

        let media = p.model
        ? `<model-viewer src="${p.model}" auto-rotate camera-controls></model-viewer>`
        : `<div style="height:220px;display:flex;align-items:center;justify-content:center;background:#f0f0f0;">
            📦 Нет 3D модели
           </div>`;

        html += `
        <div class="card">
            ${media}
            <div class="content">
                <div class="title">${p.name}</div>
                <div class="price">${p.price} ₽</div>
                <button onclick="add(${i})">В корзину</button>
            </div>
        </div>`;
    });

    document.getElementById("shop").innerHTML = html;
}

/* ADD */
function add(i){
    cart.push(products[i]);
    saveCart();
    update();
}

/* UPDATE */
function update(){
    document.getElementById("count").innerText = cart.length;

    let html = "";
    let sum = 0;

    cart.forEach(p=>{
        sum += p.price;
        html += `<div class="cart-item">${p.name} — ${p.price} ₽</div>`;
    });

    document.getElementById("items").innerHTML = html;
    document.getElementById("total").innerText = "Итого: " + sum + " ₽";
}

/* CART TOGGLE */
function toggleCart(){
    let cartEl = document.getElementById("cart");
    let overlay = document.getElementById("overlay");

    cartEl.classList.toggle("open");

    if(cartEl.classList.contains("open")){
        overlay.style.display = "block";
    } else {
        overlay.style.display = "none";
    }
}

/* ORDER */
function send(){
    let text = "Заказ:%0A";
    let sum = 0;

    cart.forEach(p=>{
        text += "- " + p.name + " (" + p.price + "₽)%0A";
        sum += p.price;
    });

    text += "%0AИтого: " + sum + "₽";

    window.open("https://t.me/" + tgUser + "?text=" + text, "_blank");
}

/* INIT */
render();
update();

</script>

</body>
</html>
