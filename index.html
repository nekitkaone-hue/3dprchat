<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NEON || 3D Печать</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f6f7fb;
}

header{
    position:sticky;
    top:0;
    background:white;
    padding:16px;
    font-weight:700;
    border-bottom:1px solid #eee;
}

.container{
    padding:15px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:12px;
}

.card{
    background:white;
    padding:14px;
    border-radius:14px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

button{
    width:100%;
    margin-top:6px;
    padding:8px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.add{background:green;color:white;}
.desc{background:#4da6ff;color:white;}

/* CART BTN */
#cartBtn{
    position:fixed;
    right:15px;
    top:15px;
    background:black;
    color:white;
    padding:10px 12px;
    border-radius:12px;
}

/* CART */
#cart{
    position:fixed;
    right:-380px;
    top:0;
    width:340px;
    height:100%;
    background:white;
    padding:15px;
    transition:.3s;
    overflow:auto;
}

#cart.open{right:0;}

.item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 0;
    border-bottom:1px solid #eee;
}

/* FIX CENTER CONTROLS */
.qty{
    display:flex;
    align-items:center;
    gap:6px;
}

.qty button{
    width:26px;
    height:26px;
    font-size:16px;
    background:#eee;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* small delete */
.del{
    width:24px;
    height:24px;
    font-size:12px;
    background:red;
    color:white;
}

/* PAY BUTTON */
.pay{
    background:#111;
    color:white;
    margin-top:10px;
}

/* overlay */
#overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.35);
    opacity:0;
    visibility:hidden;
}

#overlay.show{
    opacity:1;
    visibility:visible;
}
</style>
</head>

<body>

<header>NEON || 3D Печать</header>

<div id="cartBtn" onclick="toggleCart()">🛒 <span id="count">0</span></div>
<div id="overlay" onclick="toggleCart()"></div>

<div class="container" id="shop"></div>

<!-- CART -->
<div id="cart">
    <h3>Корзина</h3>
    <div id="items"></div>
    <p id="total">Итого: 0 ₽</p>

    <!-- 🔥 PAY BUTTON RETURNED -->
    <button class="pay" onclick="pay()">Оформить заказ</button>
</div>

<script>

let products=[
    {name:"Ваза спираль",price:600,desc:"Ваза",size:"140×139×219 мм"},
    {name:"Бюст Сталина",price:1200,desc:"Бюст",size:"176×128×245 мм"},
    {name:"Ваза сердце",price:360,desc:"Сердце",size:"200×70 мм"}
];

let cart=JSON.parse(localStorage.getItem("cart")||"[]");

function save(){
    localStorage.setItem("cart",JSON.stringify(cart));
}

function add(i){
    let f=cart.find(p=>p.id===i);

    if(f){
        f.qty++;
    }else{
        cart.push({
            id:i,
            name:products[i].name,
            price:Number(products[i].price),
            qty:1
        });
    }

    save();
    update();
}

function plus(i){
    cart[i].qty++;
    save();
    update();
}

function minus(i){
    cart[i].qty--;
    if(cart[i].qty<=0) cart.splice(i,1);
    save();
    update();
}

function remove(i){
    cart.splice(i,1);
    save();
    update();
}

function render(){
    let html="";
    products.forEach((p,i)=>{
        html+=`
        <div class="card">
            <b>${p.name}</b><br>
            ${p.price} ₽
            <button class="add" onclick="add(${i})">В корзину</button>
            <button class="desc" onclick="alert('${p.desc}\\n${p.size}')">Описание</button>
        </div>`;
    });
    document.getElementById("shop").innerHTML=html;
}

/* UPDATE FIXED */
function update(){
    let html="";
    let sum=0;
    let count=0;

    cart.forEach((p,i)=>{
        let price=Number(p.price)||0;
        let qty=Number(p.qty)||0;

        sum+=price*qty;
        count+=qty;

        html+=`
        <div class="item">
            <div>
                ${p.name}<br>
                <b>${price*qty} ₽</b>
            </div>

            <div class="qty">
                <button onclick="minus(${i})">-</button>
                ${qty}
                <button onclick="plus(${i})">+</button>
                <button class="del" onclick="remove(${i})">×</button>
            </div>
        </div>`;
    });

    document.getElementById("items").innerHTML=html;
    document.getElementById("total").innerText="Итого: "+sum+" ₽";
    document.getElementById("count").innerText=count;
}

/* PAY FUNCTION */
function pay(){
    alert("Заказ оформлен (заглушка)");
}

function toggleCart(){
    document.getElementById("cart").classList.toggle("open");
    document.getElementById("overlay").classList.toggle("show");
}

render();
update();

</script>

</body>
</html>
