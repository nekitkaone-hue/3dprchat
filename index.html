<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NEON || 3D Печать</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff">

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial;
    background: #f6f7fb;
}

/* лёгкий фон */
body::before {
    content:"";
    position:fixed;
    inset:-20%;
    background:
        radial-gradient(circle at 20% 20%, rgba(120,160,255,0.10), transparent 40%),
        radial-gradient(circle at 80% 30%, rgba(180,200,255,0.10), transparent 45%);
    z-index:-1;
}

/* header */
header {
    position: sticky;
    top: 0;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(10px);
    padding: 18px;
    font-size: 18px;
    font-weight: 600;
    border-bottom: 1px solid #eee;
}

/* grid */
.container {
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
}

/* card */
.card {
    background: white;
    border-radius: 16px;
    padding: 14px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
}

/* buttons */
button {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border: none;
    border-radius: 10px;
}

.add { background:#1faa00; color:white; }
.desc { background:#4da6ff; color:white; }

#cartBtn {
    position: fixed;
    right: 15px;
    top: 15px;
    background: #111;
    color: white;
    padding: 10px 12px;
    border-radius: 12px;
}
</style>
</head>

<body>

<header>NEON 3D PRINT</header>

<div id="cartBtn">🛒 <span id="count">0</span></div>

<div class="container" id="shop"></div>

<script>

const products = [
    {
        name:"Ваза спираль",
        price:600,
        desc:"Декоративная ваза",
        size:"140×139×219 мм"
    },
    {
        name:"Бюст Сталина",
        price:1200,
        desc:"Классический бюст",
        size:"176×128×245 мм"
    },
    {
        name:"Ваза Сердце",
        price:360,
        desc:"Форма сердца",
        size:"200×70 мм"
    }
];

let cart = [];

function render(){
    let html="";
    products.forEach((p,i)=>{
        html+=`
        <div class="card">
            <b>${p.name}</b><br>
            ${p.price} ₽
            <button class="add" onclick="add(${i})">В корзину</button>
            <button class="desc" onclick="alert('${p.desc}\\n${p.size}')">Описание</button>
        </div>`;
    });
    document.getElementById("shop").innerHTML=html;
}

function add(i){
    cart.push(products[i]);
    document.getElementById("count").innerText=cart.length;
}

/* PWA SERVICE WORKER */
if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js');
}

render();

</script>

</body>
</html>
