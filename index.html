<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NEON || 3D Печать</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial;
    background: #f6f6f6;
    color: #111;
}

header {
    position: sticky;
    top: 0;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    padding: 18px 30px;
    font-size: 20px;
    font-weight: 600;
    border-bottom: 1px solid #eee;
}

#cartBtn {
    position: fixed;
    right: 20px;
    top: 15px;
    background: #111;
    color: white;
    padding: 10px 14px;
    border-radius: 12px;
    cursor: pointer;
    z-index: 1000;
}

.container {
    max-width: 1100px;
    margin: auto;
    padding: 30px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 20px;
}

.card {
    background: white;
    border-radius: 16px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.06);
    padding: 15px;
    transition: 0.2s;
}

.card:hover {
    transform: translateY(-4px);
}

.title {
    font-size: 16px;
    font-weight: 600;
}

.price {
    margin-top: 5px;
    color: #666;
}

.size {
    font-size: 12px;
    color: #444;
    margin-top: 6px;
}

button {
    margin-top: 10px;
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #111;
    color: white;
    cursor: pointer;
}

.descBtn {
    background: #555;
    margin-top: 5px;
}

/* POPUP */
#popup {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.5);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:2000;
}

.popupBox {
    background:white;
    padding:20px;
    border-radius:14px;
    width:300px;
    text-align:center;
}

.close {
    margin-top:10px;
    background:#ff1e1e;
}

/* CART */
#cart {
    position: fixed;
    right: -400px;
    top: 0;
    width: 340px;
    height: 100%;
    background: white;
    box-shadow: -10px 0 30px rgba(0,0,0,0.1);
    padding: 20px;
    transition: 0.35s;
}

#cart.open { right: 0; }

</style>
</head>

<body>

<header>NEON || 3D Печать</header>

<div id="cartBtn" onclick="toggleCart()">🛒 <span id="count">0</span></div>

<div class="container" id="shop"></div>

<!-- POPUP -->
<div id="popup">
    <div class="popupBox">
        <h3 id="pname"></h3>
        <p id="pdesc"></p>
        <div id="psize"></div>
        <button class="close" onclick="closePopup()">Закрыть</button>
    </div>
</div>

<!-- CART -->
<div id="cart"></div>

<script>

const tgUser = "nekitka_one";

/* 🧠 ТОВАРЫ */
let products = [
    {
        name: "Ваза спиралевидная",
        price: 600,
        desc: "Современная декоративная 3D ваза с плавной спиральной формой.",
        size: "140 × 139 × 219 мм"
    },
    {
        name: "Бюст Сталина",
        price: 1200,
        desc: "Классический мраморный бюст с гладкой поверхностью.",
        size: "176 × 128 × 245 мм"
    }
];

let cart = [];

function render(){
    let html = "";

    products.forEach((p,i)=>{
        html += `
        <div class="card">
            <div class="title">${p.name}</div>
            <div class="price">${p.price} ₽</div>
            <div class="size">📏 ${p.size}</div>

            <button onclick="add(${i})">В корзину</button>
            <button class="descBtn" onclick="showDesc(${i})">Описание</button>
        </div>`;
    });

    document.getElementById("shop").innerHTML = html;
}

/* POPUP */
function showDesc(i){
    document.getElementById("popup").style.display="flex";
    document.getElementById("pname").innerText = products[i].name;
    document.getElementById("pdesc").innerText = products[i].desc;
    document.getElementById("psize").innerText = "📏 " + products[i].size;
}

function closePopup(){
    document.getElementById("popup").style.display="none";
}

/* CART */
function add(i){
    cart.push(products[i]);
    document.getElementById("count").innerText = cart.length;
}

function toggleCart(){
    alert("Корзина пока упрощённая в этой версии 👍");
}

render();

</script>

</body>
</html>
