<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NEON || 3D Печать</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial;
    background: #f6f6f6;
    color: #111;
}

/* HEADER */
header {
    position: sticky;
    top: 0;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    padding: 18px 30px;
    font-size: 20px;
    font-weight: 600;
    border-bottom: 1px solid #eee;
}

/* CART BTN */
#cartBtn {
    position: fixed;
    right: 20px;
    top: 15px;
    background: #111;
    color: white;
    padding: 10px 14px;
    border-radius: 12px;
    cursor: pointer;
    z-index: 1001;
}

/* OVERLAY */
#overlay {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.35);
    opacity:0;
    visibility:hidden;
    transition:0.25s;
    z-index:998;
}

#overlay.show {
    opacity:1;
    visibility:visible;
}

/* GRID */
.container {
    max-width: 1100px;
    margin: auto;
    padding: 30px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 20px;
}

/* CARD */
.card {
    background: #fff;
    border-radius: 18px;
    padding: 18px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    border: 1px solid #eee;
    transition: 0.25s;
}

.card:hover {
    transform: translateY(-6px);
    box-shadow: 0 14px 35px rgba(0,0,0,0.12);
}

.title {
    font-size: 17px;
    font-weight: 600;
}

.price {
    margin-top: 4px;
    color: #444;
}

/* BUTTONS */
.addBtn {
    margin-top: 12px;
    width: 100%;
    padding: 11px;
    border-radius: 12px;
    border: none;
    background: #1faa00;
    color: white;
    font-weight: 500;
    cursor: pointer;
}

.descBtn {
    margin-top: 6px;
    width: 100%;
    padding: 11px;
    border-radius: 12px;
    border: none;
    background: #4da6ff;
    color: white;
    font-weight: 500;
    cursor: pointer;
}

/* CART */
#cart {
    position: fixed;
    right: -400px;
    top: 0;
    width: 340px;
    height: 100%;
    background: white;
    box-shadow: -10px 0 30px rgba(0,0,0,0.1);
    padding: 20px;
    transition: 0.35s;
    z-index: 999;
}

#cart.open {
    right: 0;
}

.cart-item {
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid #eee;
}

.del {
    background:red;
    color:white;
    padding:5px 8px;
    border-radius:6px;
    font-size:12px;
}

/* POPUP */
#popup {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.5);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:2000;
}

.popupBox {
    background:white;
    padding:20px;
    border-radius:14px;
    width:300px;
    text-align:center;
}
</style>
</head>

<body>

<header>NEON || 3D Печать</header>

<div id="cartBtn" onclick="toggleCart()">🛒 <span id="count">0</span></div>

<div id="overlay" onclick="toggleCart()"></div>

<div class="container" id="shop"></div>

<!-- POPUP -->
<div id="popup">
    <div class="popupBox">
        <h3 id="pname"></h3>
        <p id="pdesc"></p>
        <div id="psize"></div>
        <button onclick="closePopup()" style="background:#ff1e1e;color:white;border:none;padding:10px;border-radius:10px;">
            Закрыть
        </button>
    </div>
</div>

<!-- CART -->
<div id="cart">
    <h3>Корзина</h3>
    <div id="items"></div>
    <p id="total">Итого: 0 ₽</p>

    <button onclick="send()" style="background:#1faa00;color:white;width:100%;padding:11px;border:none;border-radius:10px;">
        Заказать
    </button>

    <button onclick="clearCart()" style="background:#ff1e1e;color:white;width:100%;padding:11px;border:none;border-radius:10px;margin-top:8px;">
        Очистить корзину
    </button>
</div>

<script>

const tgUser = "nekitka_one";

/* 🧠 ТОВАРЫ */
let products = [
    {
        name: "Ваза спиралевидная",
        price: 600,
        desc: "Современная декоративная 3D ваза с плавной формой.",
        size: "140 × 139 × 219 мм"
    },
    {
        name: "Бюст Сталина",
        price: 1200,
        desc: "Классический мраморный бюст с гладкой поверхностью.",
        size: "176 × 128 × 245 мм"
    }
];

let cart = JSON.parse(localStorage.getItem("cart") || "[]");

/* SAVE */
function saveCart(){
    localStorage.setItem("cart", JSON.stringify(cart));
}

/* RENDER */
function render(){
    let html = "";

    products.forEach((p,i)=>{
        html += `
        <div class="card">
            <div class="title">${p.name}</div>
            <div class="price">${p.price} ₽</div>

            <button class="addBtn" onclick="add(${i})">В корзину</button>
            <button class="descBtn" onclick="showDesc(${i})">Описание</button>
        </div>`;
    });

    document.getElementById("shop").innerHTML = html;
}

/* POPUP */
function showDesc(i){
    document.getElementById("popup").style.display="flex";
    document.getElementById("pname").innerText = products[i].name;
    document.getElementById("pdesc").innerText = products[i].desc;
    document.getElementById("psize").innerText = "📏 " + products[i].size;
}

function closePopup(){
    document.getElementById("popup").style.display="none";
}

/* CART */
function add(i){
    cart.push(products[i]);
    saveCart();
    update();
}

function removeItem(i){
    cart.splice(i,1);
    saveCart();
    update();
}

function clearCart(){
    cart = [];
    saveCart();
    update();
}

function update(){
    document.getElementById("count").innerText = cart.length;

    let html = "";
    let sum = 0;

    cart.forEach((p,i)=>{
        let price = typeof p.price === "string" ? 1200 : p.price;
        sum += price;

        html += `
        <div class="cart-item">
            ${p.name}
            <button class="del" onclick="removeItem(${i})">×</button>
        </div>`;
    });

    document.getElementById("items").innerHTML = html;
    document.getElementById("total").innerText = "Итого: " + sum + " ₽";
}

/* CART TOGGLE */
function toggleCart(){
    document.getElementById("cart").classList.toggle("open");
    document.getElementById("overlay").classList.toggle("show");
}

/* ORDER */
function send(){
    let text = "Заказ:%0A";
    let sum = 0;

    cart.forEach(p=>{
        let price = typeof p.price === "string" ? 1200 : p.price;
        text += "- " + p.name + " (" + price + "₽)%0A";
        sum += price;
    });

    text += "%0AИтого: " + sum + "₽";

    window.open("https://t.me/" + tgUser + "?text=" + text, "_blank");
}

/* SWIPE CLOSE (mobile) */
let startX = 0;

document.addEventListener("touchstart", e=>{
    startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e=>{
    let endX = e.changedTouches[0].clientX;

    if(startX - endX < -80){
        document.getElementById("cart").classList.remove("open");
        document.getElementById("overlay").classList.remove("show");
    }
});

render();
update();

</script>

</body>
</html>
